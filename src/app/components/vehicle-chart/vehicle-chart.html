<div class="chart-container">
  <h3>🚗 Vehicle Name Analysis</h3>
  <div *ngIf="sales().length === 0" class="no-data">
    <p>No sales data available for analysis</p>
  </div>
  <div *ngIf="sales().length > 0" class="chart-content">
    <div class="bar-chart">
      <div *ngFor="let item of getVehicleAnalysis()" class="bar-item">
        <div class="bar-label">{{ item.vehicle }}</div>
        <div class="bar-wrapper">
          <div class="bar-fill" [style.width.%]="(item.count / getMaxCount()) * 100"></div>
          <div class="bar-value">{{ item.count }}</div>
        </div>
        <div class="bar-percentage">{{ item.percentage.toFixed(1) }}%</div>
      </div>
    </div>
  </div>
</div>
