<div class="admin-container">
  <div class="admin-header">
    <h2>⚙️ Admin Dashboard</h2>
  </div>

  <div class="admin-section">
    <h3>👥 Customer Accounts</h3>
    <table border="1" cellpadding="8">
      <tr>
        <th>ID</th>
        <th>Username</th>
        <th>Email</th>
        <th>Role</th>
      </tr>
      <tr *ngFor="let user of users">
        <td>{{user.id}}</td>
        <td>{{user.username}}</td>
        <td>{{user.email}}</td>
        <td>{{user.role}}</td>
      </tr>
    </table>
  </div>
</div>
