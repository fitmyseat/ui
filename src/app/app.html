<div class="app-container">
  <app-left-panel #leftPanel *ngIf="isLoggedIn"></app-left-panel>

  <div class="main-content">
    <header class="app-header">
      <button *ngIf="isLoggedIn" class="menu-toggle" (click)="toggleMenu()" aria-label="Toggle menu">
        ☰
      </button>
      <h1>🪑 FitMySeat - Premium Car Seat Covers</h1>
      <div class="auth-section">
        <button *ngIf="!isLoggedIn" class="login-btn" (click)="navigateToLogin()">Login</button>
        <div *ngIf="isLoggedIn" class="user-info">
          <span class="username">{{ currentUser?.username }}</span>
          <button class="logout-btn" (click)="logout()">Logout</button>
        </div>
      </div>
    </header>

    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </div>
</div>
