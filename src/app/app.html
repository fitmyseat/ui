<h1>FitMySeat</h1>

<app-image-upload></app-image-upload>

<hr>
<h2>Users</h2>

<table border="1" cellpadding="8">

  <tr>
    <th>ID</th>
    <th>Username</th>
    <th>Email</th>
    <th>Role</th>
  </tr>

  <tr *ngFor="let user of users">
    <td>{{user.id}}</td>
    <td>{{user.username}}</td>
    <td>{{user.email}}</td>
    <td>{{user.role}}</td>
  </tr>

</table>
